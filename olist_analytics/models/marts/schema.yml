version: 2

models:
  - name: mart_seller_performance
    description: "One row per seller with their overall performance metrics. Ready for dashboards and reporting."
    columns:
      - name: seller_id
        description: "Unique identifier for the seller."
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is located."
      - name: seller_state
        description: "State where the seller is located."
      - name: total_revenue
        description: "Total revenue generated by the seller across all orders."
      - name: total_orders
        description: "Total number of distinct orders fulfilled by the seller."
      - name: avg_review_score
        description: "Average customer review score for orders handled by this seller."

  - name: mart_sales_overview
    description: "Monthly sales aggregated by customer state. Used for geographic and time-based revenue analysis."
    columns:
      - name: customer_state
        description: "Brazilian state of the customer."
        tests:
          - not_null
      - name: ordered_at
        description: "Month of the orders, truncated to the first day of the month."
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for this state and month."
      - name: avg_review_score
        description: "Average review score for orders in this state and month."
      - name: total_orders
        description: "Total number of distinct orders in this state and month."

  - name: mart_product_category
    description: "Revenue and reviews aggregated by product category. One row per category, ordered by total revenue."
    columns:
      - name: product_category_name
        description: "Name of the product category."
      - name: total_revenue
        description: "Total revenue generated by all products in this category."
      - name: total_orders
        description: "Total number of distinct orders containing products in this category."
      - name: avg_review_score
        description: "Average review score for orders containing products in this category."
