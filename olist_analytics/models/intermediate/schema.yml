version: 2

models:
  - name: int_orders_enriched
    description: "One row per order, enriched with items, payments, reviews, and customer info. Used as the base for mart_sales_overview."
    columns:
      - name: order_id
        description: "Unique identifier for the order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Unique identifier for the customer."
      - name: ordered_at
        description: "Timestamp when the order was placed."
      - name: delivered_at
        description: "Timestamp when the order was delivered."
      - name: estimated_delivery_at
        description: "Estimated delivery timestamp at time of purchase."
      - name: total_revenue
        description: "Total item revenue for the order."
      - name: item_count
        description: "Number of items in the order."
      - name: total_freight_value
        description: "Total freight cost for the order."
      - name: total_payments
        description: "Total payment amount for the order."
      - name: common_payment_type
        description: "Most frequently used payment type for this order."
      - name: avg_review_score
        description: "Average review score given for this order."
      - name: customer_city
        description: "City of the customer."
      - name: customer_state
        description: "State of the customer."

  - name: int_sellers_enriched
    description: "One row per seller, enriched with aggregated revenue, order count, and review score. Used as the base for mart_seller_performance."
    columns:
      - name: seller_id
        description: "Unique identifier for the seller."
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is located."
      - name: seller_state
        description: "State where the seller is located."
      - name: total_revenue
        description: "Total revenue generated by the seller."
      - name: total_orders
        description: "Total number of distinct orders fulfilled by the seller."
      - name: avg_review_score
        description: "Average review score across all orders handled by the seller."

  - name: int_products_enriched
    description: "One row per product, enriched with aggregated revenue, order count, and review score. Used as the base for mart_product_category."
    columns:
      - name: product_id
        description: "Unique identifier for the product."
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Category name of the product."
      - name: total_revenue
        description: "Total revenue generated by this product across all orders."
      - name: total_orders
        description: "Total number of distinct orders containing this product."
      - name: avg_review_score
        description: "Average review score for orders containing this product."
